<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyxaria Official</title>
  <style>
    body {
      background: url('bg.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      font-family: 'Roboto', system-ui, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
      min-height: 100vh;
    }
    .overlay {
      background: rgba(15, 15, 30, 0.75);
      backdrop-filter: blur(2px);
      border-radius: 20px;
      padding: 25px;
      margin: 10px;
    }
    h1 { 
      color: #c084fc; 
      font-size: 2.3em; 
      text-shadow: 0 0 12px #c084fc;
      margin-bottom: 5px;
      font-weight: 700;
    }
    .tagline { 
      color: #ff6b9d; 
      font-size: 1.1em; 
      margin-bottom: 25px;
    }
    .box {
      background: rgba(26, 26, 46, 0.85);
      border: 2px solid #c084fc;
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
    }
    .btn {
      background: #ff6b9d;
      color: white;
      padding: 15px 30px;
      text-decoration: none;
      border-radius: 25px;
      display: inline-block;
      font-weight: bold;
      margin: 10px;
      box-shadow: 0 0 15px rgba(255, 107, 157, 0.6);
    }
    .warning {
      font-size: 0.8em;
      opacity: 0.8;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>🌌 NYXARIA 🌌</h1>
    <p class="tagline">Official Plushie Dimension</p>
    
    <div class="box">
      <h2>NYXARIA CHIBI PLUSHIE</h2>
      <p>Official Import from Nyxaria</p>
      <p>Made in India</p>
      <a href="https://instagram.com/serraorosey" class="btn">Adopt Now</a>
    </div>
    
    <p>Scanned your plushie tag? Register your Citizen ID here.</p>
    
    <p class="warning">
      ⚠️ WARNING: CHOKING HAZARD — Small parts.<br>
      Not for children under 3 years.
    </p>
    
    <p><small>© 2026 Nyxaria. All dimensions reserved.</small></p>
  </div>
</body>
</html>
